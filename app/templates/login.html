{% extends "base.html" %}
{% block titulo_pagina %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">

    <div class="card shadow border-0 rounded-3">
      <div class="card-header card-header-custom text-center py-3">
        <h4 class="mb-0"><i class="bi bi-lock-fill me-2"></i>Bienvenido</h4>
        <small class="opacity-75">Sistema de Almacén y Préstamos</small>
      </div>

      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.login') }}">

          <div class="mb-3">
            <label for="correo" class="form-label fw-semibold">
              <i class="bi bi-envelope me-1"></i> Correo electrónico
            </label>
            <input type="email" name="correo" id="correo"
                   class="form-control" value="{{ correo }}" required autofocus>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">
              <i class="bi bi-key me-1"></i> Contraseña
            </label>
            <input type="password" name="password" id="password"
                   class="form-control" required>
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar Sesión
            </button>
            <a href="{{ url_for('auth.registro') }}" class="btn btn-outline-secondary">
              <i class="bi bi-person-plus me-1"></i> Crear cuenta nueva
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
